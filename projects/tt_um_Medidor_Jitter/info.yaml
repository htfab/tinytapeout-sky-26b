# Tiny Tapeout project information
project:
  title:        "Jitter Metrics & Pulse Analyzer"
  author:       "Gustavo Ismael Chavez Mamani"
  discord:      ""      
  description:  "High-speed Jitter measurement tool with UART interface and hardware gating"
  language:     "Verilog"
  clock_hz:     50000000 

  # Tu diseño de 16 bits y UART cabe perfectamente en 1x1 tiles.
  tiles: "1x1"          

  # Top module con el prefijo obligatorio
  top_module:  "tt_um_Medidor_Jitter"

  # Listado de archivos fuente actualizados según tu estructura de carpetas
  source_files:
    - "tt_um_Medidor_Jitter.v"
    - "Banco_Registros.v"
    - "FSM_Jitter.v"
    - "Mod_Matematico.v"
    - "Motor_Captura.v"
    - "UART_V1.v"

# Definición de la interfaz física (Datasheet)
pinout:
  # Inputs
  ui[0]: "rx_pin"    # Recepción UART (Comandos)
  ui[1]: "sig_in"    # Señal de datos a analizar (Target)
  ui[2]: ""          
  ui[3]: "gate_pin"  # Habilitador de captura (GATE)
  ui[4]: "ref_clk"   # Reloj de referencia del MCU
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "tx_pin"    # Transmisión UART (Reportes)
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6