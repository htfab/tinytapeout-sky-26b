# Tiny Tapeout project information
project:
  title:        "IEEE CRC_FIFO: CRC-32 Engine with 8-Byte FIFO and VGA Displa"
  author:       "Jorge Luis Chuquimia Parra"
  discord:      ""
  description:  >
    Hardware CRC-32 engine (IEEE 802.3, 0xEDB88320) with 8-byte FIFO,
    1-bit-per-cycle serial processing, bidirectional register read interface,
    interrupt output, and real-time VGA display showing FIFO occupancy bar,
    FSM state, and all 32 CRC bits across two grid rows. Single clock domain.
  language:     "Verilog"
  clock_hz:     25000000
  tiles:        "1x1"
  top_module:   "tt_um_27jorge05_crc_fifo"
  source_files:
    - "project.v"
    - "hvsync_generator.v"

pinout:
  # Inputs
  ui[0]: "wr"
  ui[1]: "rd"
  ui[2]: "addr[0]"
  ui[3]: "addr[1]"
  ui[4]: "addr[2]"
  ui[5]: "addr[3]"
  ui[6]: "enable"
  ui[7]: "rst_crc"
  # Outputs — TinyVGA PMOD: {hsync, B[0], G[0], R[0], vsync, B[1], G[1], R[1]}
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSync"
  # Bidirectional — data bus (write: byte to FIFO / read: register value)
  uio[0]: "data[0]"
  uio[1]: "data[1]"
  uio[2]: "data[2]"
  uio[3]: "data[3]"
  uio[4]: "data[4]"
  uio[5]: "data[5]"
  uio[6]: "data[6]"
  uio[7]: "data[7]"

# Do not change!
yaml_version: 6
