# Tiny Tapeout project information
project:
  title:        "Systolic VGA Visualizer"
  author:       "siriboi"
  discord:      ""
  description:  "4x4 ternary systolic-array demo with 640x480 VGA output. The array result matrix is rendered directly as a 4x4 fullscreen heatmap."
  language:     "Verilog"
  clock_hz:     25000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_rv32_vga"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_rv32_vga.v"
    - "systolic_array.v"
    - "pe.v"
    - "vga_sync.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Demo select bit 0"
  ui[1]: "Demo select bit 1"
  ui[2]: "Unused"
  ui[3]: "Unused"
  ui[4]: "Unused"
  ui[5]: "Unused"
  ui[6]: "Unused"
  ui[7]: "Unused"

  # Outputs
  uo[0]: "VGA R1"
  uo[1]: "VGA G1"
  uo[2]: "VGA B1"
  uo[3]: "VGA VSYNC"
  uo[4]: "VGA R0"
  uo[5]: "VGA G0"
  uo[6]: "VGA B0"
  uo[7]: "VGA HSYNC"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
