# Tiny Tapeout project information
project:
  title:        "Reaction Time Game"      # Project title
  author:       "evstorms"         # Your name
  discord:      ""                 # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Multiplayer reaction time game with VGA display output (640x480), supporting Classic and Target Match modes"
  language:     "SystemVerilog"    # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25000000           # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_peterhan_ReactionGame"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_peterhan_ReactionGame.v"
    - "top.sv"
    - "button_sync.sv"
    - "lfsr16.sv"
    - "game_controller.sv"
    - "response_checker.sv"
    - "core_timer.sv"
    - "score_store.sv"
    - "vga_controller.sv"
    - "font_rom.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: "button_0"
  ui[2]: "button_1"
  ui[3]: "button_2"
  ui[4]: "button_3"
  ui[5]: "start"
  ui[6]: "mode_game"
  ui[7]: "mode_player"

  # Outputs
  uo[0]: "vga_r[1]"
  uo[1]: "vga_g[1]"
  uo[2]: "vga_b[1]"
  uo[3]: "vga_vsync"
  uo[4]: "vga_r[0]"
  uo[5]: "vga_g[0]"
  uo[6]: "vga_b[0]"
  uo[7]: "vga_hsync"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
