
# Tiny Tapeout project information
project:
  title:        "Tiny_Tapeout_Launch_Controller"      # Project title
  author:       "Eric Pearson"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Launch control chip"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     48000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_eric_lcc"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"
    - "forge_launcher.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Launch_n"
  ui[1]: "Mute_n"
  ui[2]: "Adc_Iout"
  ui[3]: "Adc_Vout"
  ui[4]: "Adc_Vcap"
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Arm_led"
  uo[1]: "Cont_led"
  uo[2]: "Speaker"
  uo[3]: "Charge"
  uo[4]: "Drive"
  uo[5]: "Dumpm"
  uo[6]: "Adc_cs"
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
