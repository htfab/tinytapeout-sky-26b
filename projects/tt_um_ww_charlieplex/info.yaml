
# Tiny Tapeout project information
project:
  title:        "7x8 Charlieplex Array Controller"      # Project title
  author:       "Wadood Wasay"      # Your name
  discord:      "@notwadood"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Custom controller for Adafruit Charlieplex LED array board"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ww_charlieplex"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "tt_ww_charlieplex.v"
    - "charlieplex_controller.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "SCLK"
  ui[1]: "CS_N"
  ui[2]: "MOSI"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: ""
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "LED0"
  uio[1]: "LED1"
  uio[2]: "LED2"
  uio[3]: "LED3"
  uio[4]: "LED4"
  uio[5]: "LED5"
  uio[6]: "LED6"
  uio[7]: "LED7"

# Do not change!
yaml_version: 6
