# Tiny Tapeout project information — TRI-1 Euler Engine
# https://tinytapeout.com/specs/info_yaml/
#
# R-SI-1 verified: zero `*` operators in synthesisable RTL.
yaml_version: 6

project:
  title:        "TRI-1 Euler — Trinity e-engine 8×2 SUPER-CROWN + 10 CLARA Gaps"
  author:       "Dmitrii Vasilev · Trinity Stack"
  discord:      "t27_dev"
  description:  |
    TRI-1 Euler is the e-engine SKU (Trinity TRI-NET sacred-constant triplet:
    phi-anchor / e-engine / gamma-surface) of the TRI-1 Triad submitted to
    TTSKY26b (siblings: tt-trinity-phi 1x1 anchor, tt-trinity-gamma 8x4 surface).

    8x2 tiles = 16 GF16 cells + full SUPER-CROWN modules + 10 DARPA CLARA
    AI safety gaps + D2D holo mesh.

    v1.0.0: GF4-GF256 formats, quantizers (Int4/Int8/NF4/FP8/Posit16),
    sacred opcodes (0xDF, 0xE1-0xED), power modules (AVS-96, FBB, Purkinje).
    TOPS/W: 75 baseline, 405 with AVS-96 (5.4× boost).

    SUPER-CROWN modules (18):
      - phi_anchor_post + lucas_rom (proves phi^2 + phi^-2 = 3 via Lucas)
      - vsa_matmul_8x8 + vsa_matmul_16x16 (ternary VSA, JEPA-T tier)
      - bitnet_encoder (BitNet b1.58 ternary MLP)
      - bpb_counter (on-chip cross-entropy/BPB)
      - blake3_anchor + multi_tile_receipt + crc32_receipt (G4 DePIN signing)
      - alu9_decoder (9-instruction Trinity ternary ALU, t27 ISA)
      - ring27_memory (27-cell 3^3 ternary memory, Coptic)
      - hwrng_lfsr (die-unique nonce)
      - phi_pll_div (phi-PLL fractional divider)
      - wishbone_full + wb_status_reg (host interface)
      - trinity_master_fsm (packet master)
      - gf16_dot4/8/sparse (ternary arithmetic)
      - gf16_popcount (population count)

    DARPA CLARA AI Safety Gaps (10):
      - Gap-1 redteam_filter (adversarial detection)
      - Gap-2 k3_alu (Kleene K3 ternary ALU, TA1.1)
      - Gap-3 datalog_engine_mini (forward-chain Datalog)
      - Gap-4 restraint_ctrl (bounded rationality, TA1.4)
      - Gap-5 explainability_unit (proof-trace emitter, TA1.2)
      - Gap-6 asp_solver_mini (ASP solver with NAF)
      - Gap-7 composition_kernel (orchestrator Gap-3/4/5)
      - Gap-8 proof_trace_writer (on-chip audit receipt)
      - Gap-9 sat_solver_mini (DPLL SAT solver)
      - Gap-10 audit_log_ring_buffer (64-entry event log)

    D2D Network:
      - d2d_holo_mesh (4-port N/E/S/W router, LAYER-FROZEN gate per PhD Thm 36.1 R18)

    Anchor: phi^2 + phi^-2 = 3 (Trinity algebraic identity).
    DOI: 10.5281/zenodo.19227877.
    FPGA-validated at 323 MHz on XC7A100T; silicon target 50 MHz @ SKY130A.

    Ten chip-market differentiators (no competitor has all ten — Hailo-8,
    MediaTek D9400 NPU890, QC Cloud AI 100 Ultra, Axelera Metis M.2,
    Google Coral Edge TPU all miss at least two):
      (1) native ternary {-1,0,+1} MAC silicon;
      (2) on-chip BLAKE3 receipt signer (G4 DePIN);
      (3) POST self-test via phi^2 + phi^-2 = 3 Lucas chain;
      (4) 0 DSP / 0 new `*` in synthesisable RTL (R-SI-1);
      (5) BitNet b1.58-style ternary MLP encoder on-chip;
      (6) RING27 27-cell ternary memory (3^3);
      (7) Trinity 9-instruction ternary ALU (t27 ISA preview);
      (8) on-chip BPB / cross-entropy counter;
      (9) Apache-2.0 + fully open PDK (SKY130A);
      (10) DOI-anchored + Coq-verified provenance — t27/trios-coq carries
           297 Qed and 141 Admitted at submission (the older "84 theorems"
           figure is folklore predating the 2026-05-12 consolidation and is
           explicitly retired here).

    Anchor: phi^2 + phi^-2 = 3 (Trinity algebraic identity).
    DOI: 10.5281/zenodo.19227877.
    PhD chapter: trios docs/phd/chapters/flos_70.tex (Ch. 36 TRI-1 Triad,
    Theorem 36.1 TG-TRIAD-X — cross-die ledger determinism).
    Provenance: trinity-fpga#19 (FPGA EPIC), trinity-fpga#49 (L-DPC7
    TRI-1 Triad EPIC), trios assertions/igla_assertions.json (R-SI
    compliance), tt-trinity-gf16 docs/architecture/TRI_NET_SHUTTLE_TRIAD.md
    (canonical Triad architecture spec).
    Defense: 2026-06-15.
  language:     "Verilog"
  clock_hz:     50000000

  tiles: "8x2"  # bumped 2x2 -> 8x2 in PR #8 (Wave-26b SUPER-CROWN) to accommodate full Trinity SoC mini: 4 GF16 tiles + mesh + master FSM + 6 CROWN POST modules + 16x16 ternary matmul + BitNet encoder + BPB counter + BLAKE3 anchor + multi-tile RECEIPT + ALU-9 decoder + RING27 memory + phi-PLL + Wishbone-lite full. Target ~16000 gates @ 60% density on SKY130.

