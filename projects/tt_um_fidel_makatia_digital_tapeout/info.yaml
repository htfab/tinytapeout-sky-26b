# Tiny Tapeout project information
project:
  title:        "8-bit Accumulator CPU SoC"
  author:       "Fidel Makatia"
  discord:      ""
  description:  "8-bit accumulator microcontroller with 33-instruction ISA, 32-word ROM, 32-byte RAM, hardware stack, UART TX, and timer/counter"
  language:     "Verilog"
  clock_hz:     5000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_fidel_makatia_digital_tapeout"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  source_files:
    - "tt_um_fidel_makatia_digital_tapeout.v"
    - "soc_top.v"
    - "alu.v"
    - "control.v"
    - "program_rom.v"
    - "regfile.v"
    - "gpio.v"
    - "uart_tx.v"
    - "timer.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "gpio_in[0]"
  ui[1]: "gpio_in[1]"
  ui[2]: "gpio_in[2]"
  ui[3]: "gpio_in[3]"
  ui[4]: "gpio_in[4]"
  ui[5]: "gpio_in[5]"
  ui[6]: "gpio_in[6]"
  ui[7]: "gpio_in[7]"

  # Outputs
  uo[0]: "gpio_out[0]"
  uo[1]: "gpio_out[1]"
  uo[2]: "gpio_out[2]"
  uo[3]: "gpio_out[3]"
  uo[4]: "gpio_out[4]"
  uo[5]: "gpio_out[5]"
  uo[6]: "gpio_out[6]"
  uo[7]: "gpio_out[7]"

  # Bidirectional pins
  uio[0]: "halted (output)"
  uio[1]: "uart_tx (output)"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
