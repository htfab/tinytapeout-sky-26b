# Tiny Tapeout project information
project:
  title:        "basic_national_anthem_buzzer"
  author:       "Eren Kaçmaz"
  discord:      ""
  description:  "Plays the Turkish National Anthem as a square-wave melody on a piezo buzzer"
  language:     "Verilog"
  clock_hz:     50000000
  tiles: "1x1"
  top_module:  "tt_um_basic_na"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "melody_rom.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "start / restart button"
  ui[1]: "loop mode (1=repeat, 0=once)"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "square-wave audio output"
  uo[1]: "playing indicator LED"
  uo[2]: "note address bit 0"
  uo[3]: "note address bit 1"
  uo[4]: "note address bit 2"
  uo[5]: "note address bit 3"
  uo[6]: "note address bit 4"
  uo[7]: "note address bit 5"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
