
# Tiny Tapeout project information
project:
  title:        "OCPU"      # Project title
  author:       "Ayan A."      # Your name
  discord:      "ayan4888"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "PLL-based OverClockable CPU"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ocpu"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "iram_regfile.v"
    - "ocpu_core.v"
    - "project.v"
    - "ospi_memory.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "OSPI SCK"
  ui[1]: "OSPI CS_N"
  ui[2]: "page_done (FPGA-to-CPU)"
  ui[3]: "page_loading (FPGA-to-CPU)"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "page_interrupt"
  uo[1]: "page_loading echo"
  uo[2]: "is_halted"
  uo[3]: "data_req"
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "OSPI IO[0]"
  uio[1]: "OSPI IO[1]"
  uio[2]: "OSPI IO[2]"
  uio[3]: "OSPI IO[3]"
  uio[4]: "OSPI IO[4]"
  uio[5]: "OSPI IO[5]"
  uio[6]: "OSPI IO[6]"
  uio[7]: "OSPI IO[7]"

# Do not change!
yaml_version: 6
