# Tiny Tapeout project information
project:
  title:        "IEEE 8-bit AXI4-Stream FWFT FIFO"      # Project title
  author:       "Benedictus Kenneth Setiadi"      # Your name
  discord:      "bkentganteng"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "An 8-bit depth-16 AXI4-Stream FIFO with First-Word Fall-Through (FWFT) using register file."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_tt08_axis_fifo_fwft_bkenololo"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_tt08_axis_fifo_fwft_bkenololo.v"
    - "axis_fifo_fwft_bkenololo.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "s_axis_tdata[0]"
  ui[1]: "s_axis_tdata[1]"
  ui[2]: "s_axis_tdata[2]"
  ui[3]: "s_axis_tdata[3]"
  ui[4]: "s_axis_tdata[4]"
  ui[5]: "s_axis_tdata[5]"
  ui[6]: "s_axis_tdata[6]"
  ui[7]: "s_axis_tdata[7]"

  # Outputs
  uo[0]: "m_axis_tdata[0]"
  uo[1]: "m_axis_tdata[1]"
  uo[2]: "m_axis_tdata[2]"
  uo[3]: "m_axis_tdata[3]"
  uo[4]: "m_axis_tdata[4]"
  uo[5]: "m_axis_tdata[5]"
  uo[6]: "m_axis_tdata[6]"
  uo[7]: "m_axis_tdata[7]"

  # Bidirectional pins
  uio[0]: "s_axis_tvalid (Input from Producer)"
  uio[1]: "s_axis_tready (Output to Producer)"
  uio[2]: "m_axis_tready (Input from Consumer)"
  uio[3]: "m_axis_tvalid (Output to Consumer)"
  uio[4]: "fifo_full_flag (Output - Debug)"
  uio[5]: "fifo_empty_flag (Output - Debug)"
  uio[6]: "NC (Not Connected)"
  uio[7]: "NC (Not Connected)"

# Do not change!
yaml_version: 6
