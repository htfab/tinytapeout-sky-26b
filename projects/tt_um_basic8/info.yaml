# Tiny Tapeout project information
project:
  title:        "Basic8 CPU"
  author:       "SalihOmerOngun"
  discord:      ""
  description:  "8-bit minimal CPU with 8 registers, ALU, branches and JAL"
  language:     "Verilog"
  clock_hz:     10000000
  tiles: "1x2"
  top_module:  "tt_um_basic8"
  source_files:
    - "project.v"
    - "alu.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "instruction byte (high or low)"
  ui[1]: "instruction byte (high or low)"
  ui[2]: "instruction byte (high or low)"
  ui[3]: "instruction byte (high or low)"
  ui[4]: "instruction byte (high or low)"
  ui[5]: "instruction byte (high or low)"
  ui[6]: "instruction byte (high or low)"
  ui[7]: "instruction byte (high or low)"
  # Outputs
  uo[0]: "PC bit 0"
  uo[1]: "PC bit 1"
  uo[2]: "PC bit 2"
  uo[3]: "PC bit 3"
  uo[4]: "PC bit 4"
  uo[5]: "PC bit 5"
  uo[6]: "PC bit 6"
  uo[7]: "PC bit 7"
  # Bidirectional pins
  uio[0]: "load_hi - latch high byte of instruction"
  uio[1]: "exec - execute instruction"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6