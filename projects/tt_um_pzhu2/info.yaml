# Tiny Tapeout project information
project:
  title:        "Hardware Triangle Rasterizer with VGA Output"
  author:       "Pauline Zhu"
  discord:      ""
  description:  "Edge-equation triangle rasterizer rendering filled triangles to a 256x256 VGA viewport at 640x480@60Hz"
  language:     "SystemVerilog"
  clock_hz:     25175000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_pzhu2"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_pzhu2.sv"
    - "top.sv"
    - "rasterizer.sv"
    - "tri_setup.sv"
    - "tri_receiver.sv"
    - "vga_module.sv"
    - "library.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "data_byte[0]"
  ui[1]: "data_byte[1]"
  ui[2]: "data_byte[2]"
  ui[3]: "data_byte[3]"
  ui[4]: "data_byte[4]"
  ui[5]: "data_byte[5]"
  ui[6]: "data_byte[6]"
  ui[7]: "data_byte[7]"

  # Outputs — TinyTapeout VGA PMOD: {R1,G1,B1,vsync,R0,G0,B0,hsync}
  uo[0]: "hsync"
  uo[1]: "blue[0]"
  uo[2]: "green[0]"
  uo[3]: "red[0]"
  uo[4]: "vsync"
  uo[5]: "blue[1]"
  uo[6]: "green[1]"
  uo[7]: "red[1]"

  # Bidirectional pins
  uio[0]: "valid (triangle data byte strobe, input)"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
