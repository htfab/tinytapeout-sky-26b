
# Tiny Tapeout project information
project: 
  title:        "PulseMon8"      # Project title
  author:       "Gurtej Randhawa"      # Your name
  discord:      "gurtejjjjj"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "8-bit pulse monitor with edge detection and compare-match logic."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_gurtej_randhawa1_pulsemon8"
  
  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "compare_value[0]"
  ui[1]: "compare_value[1]"
  ui[2]: "compare_value[2]"
  ui[3]: "compare_value[3]"
  ui[4]: "compare_value[4]"
  ui[5]: "compare_value[5]"
  ui[6]: "compare_value[6]"
  ui[7]: "compare_value[7]"

  # Outputs
  uo[0]: "count[0]"
  uo[1]: "count[1]"
  uo[2]: "count[2]"
  uo[3]: "count[3]"
  uo[4]: "count[4]"
  uo[5]: "count[5]"
  uo[6]: "count[6]"
  uo[7]: "count[7]"

  # Bidirectional pins
  uio[0]: "edge_detect"
  uio[1]: "overflow"
  uio[2]: "match_status"
  uio[3]: "freeze_status"
  uio[4]: "signal_in"
  uio[5]: "enable"
  uio[6]: "clear"
  uio[7]: "freeze_on_match"

# Do not change!
yaml_version: 6
