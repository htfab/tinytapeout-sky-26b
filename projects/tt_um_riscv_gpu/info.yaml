# Tiny Tapeout project information
project:
  title:        "4x4 BitNet b1.58 Matrix Multiply Accelerator"
  author:       "siriboi"
  discord:      ""
  description:  "SPI-controlled 4x4 W1.58A8 matrix multiply accelerator (BitNet b1.58): uint8 activations x ternary {-1,0,+1} weights, multiplier-free PE-parallel MAC"
  language:     "Verilog"
  clock_hz:     50000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_riscv_gpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_riscv_gpu.v"
    - "spi_slave.v"
    - "mac_core.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "spi_sclk"
  ui[1]: "spi_cs_n"
  ui[2]: "spi_mosi"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "spi_miso"
  uo[1]: "busy"
  uo[2]: "done"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
