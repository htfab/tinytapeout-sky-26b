# Tiny Tapeout project information
project:
  title: "IEEE Open-Silicon 2026: Adaptive Traffic Light Controller with Emergency Override"
  author: "Anthony Ebo, Abubakar Abdulfatah, Amaechina Sinclair, Taofeek Kassim, Abdulmaleek"
  discord: ""
  description: "FSM-based two-road traffic light controller with sensor-adaptive green-phase extension and hardware emergency-vehicle priority override."
  language: "Verilog"
  clock_hz: 10000000 # 10MHz "Set CLOCK_DIV=10M for realistic 30s timing"

  tiles: "1x1"

  top_module: "tt_um_traffic_ctrl"

  source_files:
    - "traffic_fsm.v"
    - "tt_um_traffic_ctrl_top.v"

pinout:
  # Inputs
  ui[0]: "sensor_ns: vehicle sensor on N/S road (active high)"
  ui[1]: "sensor_ew: vehicle sensor on E/W road (active high)"
  ui[2]: "emrg_ns:   emergency vehicle on N/S axis (active high)"
  ui[3]: "emrg_ew:   emergency vehicle on E/W axis (active high)"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "sig_ns[0]: N/S GREEN  (high = green lit)"
  uo[1]: "sig_ns[1]: N/S YELLOW (high = yellow lit; both low = red)"
  uo[2]: "sig_ew[0]: E/W GREEN"
  uo[3]: "sig_ew[1]: E/W YELLOW"
  uo[4]: "emrg_active: high during any emergency FSM state"
  uo[5]: "state[0]: FSM state bit 0 (for 7-segment debug)"
  uo[6]: "state[1]: FSM state bit 1"
  uo[7]: "state[2]: FSM state bit 2"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
