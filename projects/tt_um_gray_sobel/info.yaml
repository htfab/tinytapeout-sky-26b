# Tiny Tapeout project information
project:
  title:        "tt_um_sobel_threshold"      # Project title
  author:       "Jhon Ramirez & Diana Maldonado"      # Your name
  discord:      "jharamirezma"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Grayscale, Sobel filter and thresholding."      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000000      # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_gray_sobel"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:     
    - "tt_um_gray_sobel.sv"   
    - "top_gray_sobel.sv"
    - "sobel_control.sv"
    - "sobel_core.sv"
    - "ema_threshold.sv"
    - "gray_scale_core.sv"
    - "spi_core.sv"
    - "spi_control.sv"
    - "async_nreset_synchronizers.sv"
    - "LFSR.sv"
    - "signature_analyzer.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "spi_cs_i"
  ui[1]: "spi_sck_i" 
  ui[2]: "spi_sdi_i"
  ui[3]: "select_process_i[0]"
  ui[4]: "select_process_i[1]"
  ui[5]: "select_process_i[2]"
  ui[6]: "start_sobel_i"
  ui[7]: "sa_en_i"

  # Outputs
  uo[0]: "select_process_i[0]"
  uo[1]: "select_process_i[1]"
  uo[2]: "select_process_i_sync[2]"
  uo[3]: "spi_sdo_o"
  uo[4]: "lfsr_done"
  uo[5]: "LED_sa_en"
  uo[6]: "LED_LFSR_enable"
  uo[7]: "LED_lfsr_mode_sel"

  # Bidirectional pins
  uio[0]: "LFSR_enable_i"
  uio[1]: "seed_stop_i"
  uio[2]: "lfsr_en_i"
  uio[3]: "lfsr_mode_sel_i"
  uio[4]: "sa_clear_i"
  uio[5]: "frame_done_i"
  uio[6]: "start_threshold_i"
  uio[7]: ""

# Do not change!
yaml_version: 6  