# Tiny Tapeout project information
project:
  title:        "Onchip-UIS CLK Frequency Divider"      # Project title
  author:       "Ramon Sarmiento"      # Your name
  discord:      "zhord0326"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Generates several frequency clock signals from a user-selected M module"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_Onchip_Freq_Divider_Dig"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Module[0]"
  ui[1]: "Module[1]"
  ui[2]: "Module[2]"
  ui[3]: "Module[3]"
  ui[4]: "Module[4]"
  ui[5]: "Module[5]"
  ui[6]: "Module[6]"
  ui[7]: "Module[7]"

  # Outputs
  uo[0]: "CLK_1/64"     #A
  uo[1]: "CLK_1/2"     #B
  uo[2]: "CLK_1/4"     #C
  uo[3]: "CLK_1/8"     #D
  uo[4]: "CLK_1/16"    #E
  uo[5]: "CLK_1/32"    #F
  uo[6]: "CLK_1/128"   #G
  uo[7]: "Dot"         #Dot

  # Bidirectional pins
  uio[0]: "Module M signal"
  uio[1]: "CLK_1/2"
  uio[2]: "CLK_1/4"
  uio[3]: "CLK_1/8"
  uio[4]: "CLK_1/16"
  uio[5]: "CLK_1/32"
  uio[6]: "CLK_1/64"
  uio[7]: "CLK_1/128"

# Do not change!
yaml_version: 6
