project:
  title:        "rv32i RISC-V ALU"
  author:       "Ahmed Mustakim — UCF EEE-5390C"
  discord:      ""
  description:  "Full 32-bit RISC-V ALU implementing ADD SUB AND OR XOR SLL SRL SRA SLT SLTU. Part of rv32imsu SoC designed in Synopsys ICC2 on sky130A at UCF."
  language:     "Verilog"
  clock_hz:     50000000
  tiles:        "1x1"
  top_module:   "tt_um_riscv_alu"
  source_files:
    - "tt_um_riscv_alu.v"
    - "riscv_alu.v"
    - "riscv_defs.v"
pinout:
  ui[0]: "a_sel[1]"
  ui[1]: "a_sel[0]"
  ui[2]: "op[3]"
  ui[3]: "op[2]"
  ui[4]: "op[1]"
  ui[5]: "op[0]"
  ui[6]: "b_sel[1]"
  ui[7]: "b_sel[0]"
  uo[0]: "result[7]"
  uo[1]: "result[6]"
  uo[2]: "result[5]"
  uo[3]: "result[4]"
  uo[4]: "result[3]"
  uo[5]: "result[2]"
  uo[6]: "result[1]"
  uo[7]: "result[0]"
  uio[0]: "out_sel[1] or data[7]"
  uio[1]: "out_sel[0] or data[6]"
  uio[2]: "data[5]"
  uio[3]: "data[4]"
  uio[4]: "data[3]"
  uio[5]: "data[2]"
  uio[6]: "data[1]"
  uio[7]: "data[0]"
yaml_version: 6
