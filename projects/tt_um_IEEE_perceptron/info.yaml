# Tiny Tapeout project information
project:
  title:        "1-bit Perceptron - Hardware Neuron"   
  author:       "Jacob Kirera"    
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A single artificial neuron (perceptron) implemented in pure combinational logic. Four binary inputs are each multiplied by a 2-bit weight, summed in an adder tree, and compared to a configurable threshold. The neuron fires (output = 1) when the weighted sum meets or exceeds the threshold.This is the fundamental building block of every neural network — on real
    silicon. Weights and threshold are set live via input pins, making it
    fully reconfigurable without re-synthesis."    
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"         

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_IEEE_perceptron"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "x0 — binary input 0"
  ui[1]: "x1 — binary input 1"
  ui[2]: "x2 — binary input 2"
  ui[3]: "x3 — binary input 3"
  ui[4]: "w0[0] — weight 0, bit 0"
  ui[5]: "w0[1] — weight 0, bit 1"
  ui[6]: "w1[0] — weight 1, bit 0"
  ui[7]: "w1[1] — weight 1, bit 1"

  # Outputs
  uo[0]: "y — neuron output (1=fires, 0=silent)"
  uo[1]: "sum[0] — weighted sum bit 0 (debug)"
  uo[2]: "sum[1] — weighted sum bit 1 (debug)"
  uo[3]: "sum[2] — weighted sum bit 2 (debug)"
  uo[4]: "sum[3] — weighted sum bit 3 (debug)"
  uo[5]: "unused"
  uo[6]: "unused"
  uo[7]: "unused"

  # Bidirectional pins(extra inputs)
  uio[0]: "w2[0] — weight 2, bit 0"
  uio[1]: "w2[1] — weight 2, bit 1"
  uio[2]: "w3[0] — weight 3, bit 0"
  uio[3]: "w3[1] — weight 3, bit 1"
  uio[4]: "thresh[0] — threshold bit 0"
  uio[5]: "thresh[1] — threshold bit 1"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
