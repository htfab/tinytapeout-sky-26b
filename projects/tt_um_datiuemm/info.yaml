# Tiny Tapeout project information
project:
  title:        "mbist-ecc-8x32"      # Project title
  author:       "datiuemm"      # Your name
  discord:      "none"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "This is MBIST and ECC on 8x32 data RAM"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_datiuemm"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "RAM8.nl.v"
    - "MBIST.v"
    - "ecc_enc.v"
    - "ecc_dec.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "MBIST Enable"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "[MBIST] Activated"
  uo[1]: "[MBIST] Fail"
  uo[2]: "[MBIST] Pass"
  uo[3]: "RAM Enable"
  uo[4]: "ECC Bypass Status"
  uo[5]: "[ECC] Single Bit Error Detected"
  uo[6]: "[ECC] Double Bit Error Detected"
  uo[7]: "[ECC] Single Bit Error Fix"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
