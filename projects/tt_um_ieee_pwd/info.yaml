# Tiny Tapeout project information
project:
  title:        "IEEE PWM Generator"
  author:       "Maria Jose Huiza"
  discord:      ""
  description:  "2-bit PWM generator with configurable duty cycle via reference bits"
  language:     "Verilog"
  clock_hz:     0

  tiles: "1x1"

  top_module:  "tt_um_ieee_pwd"

  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "PWM reference (duty cycle), bit 0 (LSB)"
  ui[1]: "PWM reference (duty cycle), bit 1 (MSB)"
  ui[2]: "State bits, bit 0 (LSB) [unused internally]"
  ui[3]: "State bits, bit 1 (MSB) [unused internally]"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""
  # Outputs
  uo[0]: "PWM output signal"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
