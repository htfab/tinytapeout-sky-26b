# Tiny Tapeout project information
project:
  title:        "tiny OoO CPU"      # Project title
  author:       "Amin Hong"      # Your name
  discord:      "test"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Small out-of-order CPU with instruction queue, RAT, ROB, and reservation stations"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     30000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_amin_hong_ooo_cpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "chip.sv"
    - "instruction_queue.sv"
    - "register_file.sv"
    - "register_alias_table.sv"
    - "alu_unit.sv"
    - "alu_reservation_station.sv"
    - "mem_reservation_station.sv"
    - "reorder_buffer.sv"
    - "memory_unit.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "instruction[0]"
  ui[1]: "instruction[1]"
  ui[2]: "instruction[2]"
  ui[3]: "instruction[3]"
  ui[4]: "instruction[4]"
  ui[5]: "instruction[5]"
  ui[6]: "instruction[6]"
  ui[7]: "instruction[7]"

  # Outputs
  uo[0]: "output[0]"
  uo[1]: "output[1]"
  uo[2]: "output[2]"
  uo[3]: "output[3]"
  uo[4]: "output[4]"
  uo[5]: "output[5]"
  uo[6]: "output[6]"
  uo[7]: "output[7]"

  # Bidirectional pins
  uio[0]: "instruction[8]"
  uio[1]: "instruction[9]"
  uio[2]: "instruction[10]"
  uio[3]: "instruction[11]"
  uio[4]: "output[8]"
  uio[5]: "output[9]"
  uio[6]: "output[10]"
  uio[7]: "output[11]"

# Do not change!
yaml_version: 6
