# Tiny Tapeout project information — TRI-1 MAX-TRUE NEUROMORPHIC FLAGSHIP
# https://tinytapeout.com/specs/info_yaml/
#
# L-DPC22-K S-13 DUAL-LIB ZONING HINT (feat/v15/k-dual-lib)
# Primary standard-cell library: sky130_fd_sc_hd
# Leakage-reduction target library: sky130_fd_sc_hdll
# Low-activity blocks targeted for hdll zoning:
#   lucas_rom* (POST chain x7), crc32_receipt, blake3_anchor, gf16_mul
# Expected static leakage saving: ~30% (5-10x lower per-cell leakage on hdll
# vs hd variant; mixed-mode zoning expected to reduce ~30% at block level).
# See docs/L-DPC22-K-DUAL-LIB.md for full specification.
# Reference: https://skywater-pdk.readthedocs.io/en/main/contents/libraries/foundry-provided.html
# G-13 gate: mixed hd+hdll closes timing if WNS>=0; rollback to pure hd if WNS<0.
# R-SI-1 verified: Lane K is config/docs only - zero changes to src/*.v
yaml_version: 6

project:
  title:        "TRI-1 Gamma — MAX-TRUE NEUROMORPHIC FLAGSHIP 32-tile 8-column"
  author:       "Dmitrii Vasilev"
  discord:      "ghashtag"
  description:  >
    MAX-TRUE NEUROMORPHIC FLAGSHIP SKU of the TRI-1 Triad (TTSKY26b).
    32 tiles = 8x4 TT footprint. Architecture: 8 cortical columns
    (cortical_column.v — LIF leaky-integrate-and-fire dynamics with 8-bit
    membrane potential, BitNet b1.58 ternary MLP hidden layer, GF16 dot4
    input projection, sparse PE accumulator; ~500 cells/column = ~4100 total)
    + 20-PE GF16 mesh (1x trinity_quad_mesh 16 PE + 1x trinity_mesh_2x2 4 PE)
    + 24 SUPER-CROWN modules (phi_anchor_post, lucas_rom x7, vsa_matmul_8x8,
    vsa_matmul_16x16, bitnet_encoder, bpb_counter, blake3_anchor,
    multi_tile_receipt, crc32_receipt, alu9_decoder, ring27_memory, hwrng_lfsr,
    phi_pll_div, wb_status_reg, wishbone_full, trinity_master_fsm,
    trinity_mesh_2x2, gf16_dot4, plus 6 PhD-anchored monitors:
    cassini_post, plrm_counter, bpb_lower_bound_guard, nca_entropy_monitor,
    strobe_seed_guard, phi_distance_oracle)
    + D2D holo mesh 4-port N/E/S/W router (d2d_holo_mesh.v — adapted from
    tt-trinity-holo TTSKY26c lineage; uio[3:0]=TX, uio[7:4]=RX inputs;
    LAYER-FROZEN gate on w_tx per PhD Theorem 36.1 R18)
    + full Crown47 ROM (crown47_rom + crown47_rom_8bit)
    + TRI NET friend/foe handshake (GAMMA anchor 8'h93)
    + FHRR holo_lut_pe (VSA binding, Glava 32).
    v1.0.0 enhancements: GF4/GF8/GF12/GF16/GF20/GF24/GF32/GF64/GF128/GF256 formats,
    quantizers (Int4/Int8/NF4/FP8_E4M3/FP8_E5M2/Posit16), sacred opcodes
    (0xDF LUT_LOOKUP, 0xE1 SPARSE_SKIP, 0xE3 LUT_NPU, 0xE5 SUBTH_CLK,
    0xE6 HOLO_MUX_X4, 0xE7 DFS_GATE, 0xE8 SPARSE_SKIP2, 0xE9 STOCH_ROUND,
    0xEA NULL_PE, 0xEB SPEC_EXIT, 0xEC DROWSY_RET), power modules
    (AVS-48/96, FBB, Purkinje thermal). TOPS/W: 75 baseline, 405 with AVS-96.
    TG-TRIAD-X canonical anchor 0x47C0 on {uio_out,uo_out} at reset
    (PhD Theorem 36.1, docs/phd/chapters/flos_70.tex).
    R-SI-1: zero NEW * operators (legacy gf16_mul grandfathered per
    TRI_NET_SHUTTLE_TRIAD.md Rule 2 / tt-trinity-gf16#4).
    Anchor: phi^2 + phi^-2 = 3. DOI: 10.5281/zenodo.19227877.
    tt-trinity-holo D2D lineage (TTSKY26c, 1x2, r_marker_rom.v).
    S-13 dual-lib: sky130_fd_sc_hd primary + sky130_fd_sc_hdll for
    low-activity blocks. See docs/L-DPC22-K-DUAL-LIB.md.
  language:     "Verilog"
  clock_hz:     50000000

  # 8x4 TT tiles = 32 tiles = 0.704 mm2 Sky130A (MAX footprint).
  # Cell budget at 60% util ceiling = ~48000 cells.
  # Estimated: ~4100 (neuromorphic) + ~30000 (existing) = ~34100 total.
  # Valid sky130A tile sizes: 1x1,1x2,2x2,3x2,4x2,6x2,8x2,4x4,6x4,8x4.
  # See https://github.com/TinyTapeout/tt-support-tools/blob/main/tech/sky130A/tile_sizes.yaml
  tiles:        "8x4"

