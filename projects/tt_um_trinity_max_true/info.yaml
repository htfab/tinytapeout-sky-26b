pinout:
  ui[0]: "load_mode (0=canonical 0x47C0 default, 1=packet path + status_byte)"
  ui[1]: "lucas_idx[0]"
  ui[2]: "lucas_idx[1]"
  ui[3]: "lucas_idx[2]"
  ui[4]: "tri_status_msb (ui[4:2]=3b111 → token balance on uo/uio_out)"
  ui[5]: "unused (ui[4:2] tri_status decoded, ui[7:5] unused)"
  ui[6]: "crown_addr[6:0] MSB (with ui[5:0])"
  ui[7]: "unused"
  uo[0]: "result[0] (canonical 0x47C0 default; mesh result_lo[0] after FSM)"
  uo[1]: "result[1]"
  uo[2]: "result[2]"
  uo[3]: "result[3]"
  uo[4]: "result[4]"
  uo[5]: "result[5]"
  uo[6]: "result[6]"
  uo[7]: "result[7]"
  uio[0]: "D2D n_tx — North TX (output): spike_count[3] activity bit"
  uio[1]: "D2D e_tx — East TX (output): spike_count[0] activity bit"
  uio[2]: "D2D s_tx — South TX (output): GF16 route tag bit"
  uio[3]: "D2D w_tx — West TX SYNC strobe (output, LAYER-FROZEN gated per PhD Thm 36.1 R18)"
  uio[4]: "D2D n_rx — North RX (input from peer die)"
  uio[5]: "D2D e_rx — East RX (input from peer die)"
  uio[6]: "D2D s_rx — South RX (input from peer die)"
  uio[7]: "D2D w_rx (input from peer die) / crown_mode enable when high + load_mode=0"
