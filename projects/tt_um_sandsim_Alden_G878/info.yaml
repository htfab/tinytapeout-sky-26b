# Tiny Tapeout project information
project:
  title:        "SandSim"      # Project title
  author:       "Alden Grover"      # Your name
  discord:      "nobodyspecial1874"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Physics engine that simulates falling sand on a 2d plane"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25175000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_sandsim_Alden_G878"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_sandsim.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Add sand"
  ui[1]: "Add sand"
  ui[2]: "Add sand"
  ui[3]: "Add sand"
  ui[4]: "Add sand"
  ui[5]: "Add sand"
  ui[6]: "Add sand"
  ui[7]: "Add sand"

  # Outputs
  uo[0]: "VGA_R1"
  uo[1]: "VGA_G1"
  uo[2]: "VGA_B1"
  uo[3]: "VGA_vsync"
  uo[4]: "VGA_R0"
  uo[5]: "VGA_G0"
  uo[6]: "VGA_B0"
  uo[7]: "VGA_hsync"

  # Bidirectional pins
  uio[0]: "QSPI_FLASH_CSB"
  uio[1]: "QSPI_SD0"
  uio[2]: "QSPI_SD1"
  uio[3]: "QSPI_SCK"
  uio[4]: "QSPI_SD2"
  uio[5]: "QSPI_SD3"
  uio[6]: "QSPI_RAM_CS1"
  uio[7]: "QSPI_RAM_CS2"

# Do not change!
yaml_version: 6
