# Tiny Tapeout project information
project:
  title:        "Shiftregister Challenge 40 Bit"
  author:       "Thorsten Knoll"
  discord:      ""      # Your discord username (optional)
  description:  "The design is a 40 bit shiftregister with a hardcoded 40 bit number. The challenge is to find the correct 40 bit to enable the output to high. With all other numbers the output will be low."
  language:     "Verilog"
  clock_hz:     10000000  # 10 MHz

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Top module name must start with "tt_um_"
  top_module: "tt_um_thorsten_shiftregister"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "Serial data input (shift in bit by bit)"
  ui[1]: "Shift enable (active high)"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Challenge output: HIGH when correct 40-bit key is shifted in"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
