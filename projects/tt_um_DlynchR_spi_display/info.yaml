# Tiny Tapeout project information
project:
  title:        "tt_um_DlynchR_spi_display"      # Project title
  author:       "Denzel"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "SPI slave -> 3-digit 7-segment display"
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)
 
  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2
 
  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_DlynchR_spi_display"
 
  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "spi_slave.v"
    - "seg7_hex3.v"
 
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs — byte paralelo a transmitir por SPI (cargado antes de CS bajo)
  ui[0]: "tx_data[0]"
  ui[1]: "tx_data[1]"
  ui[2]: "tx_data[2]"
  ui[3]: "tx_data[3]"
  ui[4]: "tx_data[4]"
  ui[5]: "tx_data[5]"
  ui[6]: "tx_data[6]"
  ui[7]: "tx_data[7]"
 
  # Outputs — 7 segmentos + punto decimal (todos activos en bajo)
  uo[0]: "seg_a"
  uo[1]: "seg_b"
  uo[2]: "seg_c"
  uo[3]: "seg_d"
  uo[4]: "seg_e"
  uo[5]: "seg_f"
  uo[6]: "seg_g"
  uo[7]: "dp"
 
  # Bidirectional pins — SPI + ánodos del display
  uio[0]: "sck"        # SPI clock (in)
  uio[1]: "cs_n"       # Chip select activo bajo (in)
  uio[2]: "mosi"       # Master Out Slave In (in)
  uio[3]: "miso"       # Master In Slave Out (out)
  uio[4]: "rx_valid"   # Pulso 1 ciclo: byte recibido (out)
  uio[5]: "an0"        # Ánodo dígito derecho (out, activo bajo)
  uio[6]: "an1"        # Ánodo dígito central (out, activo bajo)
  uio[7]: "an2"        # Ánodo dígito izquierdo (out, activo bajo)
 
# Do not change!
yaml_version: 6